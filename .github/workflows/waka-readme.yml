name: Waka Readme

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Waka Stats
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your fork
        uses: actions/checkout@v3
        with:
          repository: airesx2/waka-readme-stats
          ref: master
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Waka Readme script
        run: |
          python sources/main.py
        env:
          INPUT_WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          INPUT_GH_TOKEN: ${{ secrets.GH_TOKEN }}
          INPUT_SHOW_OS: "False"
          INPUT_SHOW_PROJECTS: "False"
          INPUT_SHOW_TIMEZONE: "False"
          INPUT_SHOW_EDITORS: "False"
          INPUT_SHOW_LANGUAGE_PER_REPO: "False"
          INPUT_SHOW_SHORT_INFO: "False"
          INPUT_SHOW_LOC_CHART: "False"
          INPUT_COMMIT_BY_ME: "True"
          INPUT_SHOW_TOTAL_CODE_TIME: "True"
          INPUT_SHOW_PROFILE_VIEWS: "False"
          INPUT_SHOW_COMMIT: "True"
          INPUT_SHOW_DAYS_OF_WEEK: "True"
