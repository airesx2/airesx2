name: Waka Readme

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Waka Stats
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v3
        with:
          repository: airesx2/waka-readme-stats  # your fork
          ref: main                               # make sure your branch is actually called 'main'
          token: ${{ secrets.GH_TOKEN }}         # ensures private/fork access if needed

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11  # match your repo's Python version

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Waka Readme script
        run: |
          python main.py
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_OS: "False"
          SHOW_PROJECTS: "False"
          SHOW_TIMEZONE: "False"
          SHOW_EDITORS: "False"
          SHOW_LANGUAGE_PER_REPO: "False"
          SHOW_SHORT_INFO: "False"
          SHOW_LOC_CHART: "False"
          COMMIT_BY_ME: "True"
          SHOW_TOTAL_CODE_TIME: "False"
